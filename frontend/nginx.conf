server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://stockflow-backend-xbwt.onrender.com/;
        proxy_ssl_server_name on;
    }
}
